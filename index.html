  <script>
    // Fix specific counter values on the site
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.font-bold.text-sm').forEach(el => {
        if (el.textContent.trim() === '1+' && el.closest('.bg-white.rounded-lg.shadow-md')) {
          const parent = el.closest('.bg-white.rounded-lg.shadow-md');
          const label = parent && parent.querySelector('.font-semibold');
          if (label && label.textContent.includes('MAHARASHTRA')) {
            el.textContent = '1';
          }
        }
      });
      // Fix testimonials page counters
      document.querySelectorAll('.font-bold.text-navy.mb-1').forEach(el => {
        const label = el.parentElement && el.parentElement.querySelector('.font-bold.text-orange');
        if (!label) return;
        const labelText = label.textContent.trim().toUpperCase();
        if (labelText.includes('TOTAL STUDENTS') && el.textContent.trim() === '14,000+') {
          el.textContent = '8,000+';
        }
        if (labelText.includes('IITIAN') && el.textContent.trim() === '20+') {
          el.textContent = '100+';
        }
      });
      // Inject extra testimonial row on testimonials page
      if (window.location.pathname === '/testimonials') {
        const grid = document.querySelector('.grid.gap-6.max-w-7xl');
        if (grid && !document.getElementById('extra-testimonials')) {
          // Change existing grid to 4 columns
          grid.classList.remove('lg:grid-cols-3');
          grid.classList.add('lg:grid-cols-4');
          const extraRow = document.createElement('div');
          extraRow.id = 'extra-testimonials';
          extraRow.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto';
          extraRow.style.cssText = 'margin-bottom:1.5rem;';
          const students = [
            {name:'Rahul Sawant',img:'/Rahul%20Shivaji%20Sawant.jpg',quote:'The structured study plan and daily tests helped me stay consistent throughout my preparation.',tag:'JEE Student'},
            {name:'Divya Salve',img:'/Divya.JPG',quote:'Faculty members are always available for doubt solving. The mentorship sessions were game-changing.',tag:'JEE Student'},
            {name:'Atharva',img:'/ATHARVA.JPG',quote:'The integrated coaching system saved me time and helped me focus on what matters most.',tag:'JEE Student'},
            {name:'Arya Thorat',img:'/Arya%20Thorat.JPG',quote:'Excellent faculty and study environment. The personalized attention helped me improve significantly.',tag:'JEE Student'}
          ];
          const starSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#F6A01A" stroke="#F6A01A" style="width:1rem;height:1rem;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
          const stars = Array(5).fill(starSvg).join('');
          extraRow.innerHTML = students.map(s => `
            <div class="group relative bg-white rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 border border-gray-100">
              <div style="display:flex;gap:0.25rem;margin-bottom:1rem;">${stars}</div>
              <p class="text-gray-600 leading-relaxed italic mb-6 text-sm">&ldquo;${s.quote}&rdquo;</p>
              <div style="display:flex;align-items:center;gap:0.75rem;border-top:1px solid #f3f4f6;padding-top:1rem;">
                <img src="${s.img}" alt="${s.name}" style="width:4rem;height:4rem;border-radius:9999px;object-fit:cover;object-position:top;box-shadow:0 0 0 2px #e5e7eb;"/>
                <div>
                  <h4 class="font-bold text-gray-900 text-sm">${s.name}</h4>
                  <p style="font-size:0.75rem;font-weight:600;color:#525CEB;">${s.tag}</p>
                </div>
              </div>
            </div>
          `).join('');
          grid.parentNode.insertBefore(extraRow, grid);
        }
      }
    });
    document.addEventListener('DOMContentLoaded', () => {
      observer.observe(document.getElementById('root'), { childList: true, subtree: true, characterData: true });
    });
